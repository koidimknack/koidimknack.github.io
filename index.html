<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koid im Knack</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }
    #controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      gap: 10px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      box-sizing: border-box;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
    }
    .control-row label {
      min-width: 90px;
      font-size: 0.95rem;
    }
    .control-row input[type='range'] {
      flex: 1;
    }
    .control-row .speed-value {
      min-width: 42px;
      text-align: right;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="screen"></canvas>
    <div id="controls"></div>
  </div>
  <script>
    const canvas = document.getElementById('screen');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    const imageFiles = [
      'blue.png',
      'red.png',
      'yellow.png',
      'green.png'
    ];

    const imageLinks = [
      null,
      null,
      null,
      'https://sebastianratzenboeck.github.io/'
    ];

    const images = imageFiles.map((fileName) => {
      const img = new Image();
      img.src = `images/${fileName}`;
      return img;
    });

    const sprites = imageFiles.map((_, index) => ({
      x: 0,
      y: 0,
      dx: 0,
      dy: 0,
      baseSpeed: 5,
      width: 80,
      height: 80,
      imageIndex: index,
      url: imageLinks[index] || null,
    }));

    let speedFactor = 1;

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randomizeSprite(sprite) {
      sprite.x = randomBetween(0, canvas.width - sprite.width);
      sprite.y = randomBetween(0, canvas.height - sprite.height);
      sprite.baseSpeed = randomBetween(2.5, 10);
      const angle = randomBetween(0, Math.PI * 2);
      sprite.dx = Math.cos(angle);
      sprite.dy = Math.sin(angle);
      if (Math.abs(sprite.dx) < 0.3) sprite.dx = Math.sign(sprite.dx || 1) * 0.3;
      if (Math.abs(sprite.dy) < 0.3) sprite.dy = Math.sign(sprite.dy || 1) * 0.3;
      const length = Math.sqrt(sprite.dx * sprite.dx + sprite.dy * sprite.dy);
      sprite.dx /= length;
      sprite.dy /= length;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      sprites.forEach((sprite) => {
        const image = images[sprite.imageIndex];
        if (image.complete && image.naturalWidth > 0) {
          ctx.drawImage(image, sprite.x, sprite.y, sprite.width, sprite.height);
        } else {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(sprite.x, sprite.y, sprite.width, sprite.height);
        }
      });
    }

    function collides(a, b) {
      return a.x < b.x + b.width && a.x + a.width > b.x &&
             a.y < b.y + b.height && a.y + a.height > b.y;
    }

    function resolveCollision(a, b) {
      const overlapX = Math.min(a.x + a.width - b.x, b.x + b.width - a.x);
      const overlapY = Math.min(a.y + a.height - b.y, b.y + b.height - a.y);
      const speed = a.baseSpeed;
      a.baseSpeed = b.baseSpeed;
      b.baseSpeed = speed;
      if (overlapX < overlapY) {
        const direction = a.x < b.x ? -1 : 1;
        a.x += direction * overlapX / 2;
        b.x -= direction * overlapX / 2;
        const dx = a.dx;
        a.dx = b.dx;
        b.dx = dx;
      } else {
        const direction = a.y < b.y ? -1 : 1;
        a.y += direction * overlapY / 2;
        b.y -= direction * overlapY / 2;
        const dy = a.dy;
        a.dy = b.dy;
        b.dy = dy;
      }
    }

    function update() {
      sprites.forEach((sprite) => {
        sprite.x += sprite.dx * sprite.baseSpeed * speedFactor;
        sprite.y += sprite.dy * sprite.baseSpeed * speedFactor;

        if (sprite.x + sprite.width > canvas.width) {
          sprite.x = canvas.width - sprite.width;
          sprite.dx *= -1;
        } else if (sprite.x < 0) {
          sprite.x = 0;
          sprite.dx *= -1;
        }
        if (sprite.y + sprite.height > canvas.height) {
          sprite.y = canvas.height - sprite.height;
          sprite.dy *= -1;
        } else if (sprite.y < 0) {
          sprite.y = 0;
          sprite.dy *= -1;
        }
      });

      for (let i = 0; i < sprites.length; i += 1) {
        for (let j = i + 1; j < sprites.length; j += 1) {
          const a = sprites[i];
          const b = sprites[j];
          if (collides(a, b)) {
            resolveCollision(a, b);
          }
        }
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function getCanvasClickPos(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    canvas.addEventListener('click', (event) => {
      const clickPos = getCanvasClickPos(event);
      for (const sprite of sprites) {
        if (
          clickPos.x >= sprite.x &&
          clickPos.x <= sprite.x + sprite.width &&
          clickPos.y >= sprite.y &&
          clickPos.y <= sprite.y + sprite.height
        ) {
          if (sprite.url) {
            window.open(sprite.url, '_blank');
          }
          break;
        }
      }
    });

    const controls = document.getElementById('controls');
    const row = document.createElement('div');
    row.className = 'control-row';

    const label = document.createElement('label');
    label.textContent = "Speed";

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = '0.2';
    slider.max = '3';
    slider.step = '0.1';
    slider.value = '1';

    const value = document.createElement('span');
    value.className = 'speed-value';
    value.textContent = Number('1').toFixed(1);

    slider.addEventListener('input', () => {
      speedFactor = parseFloat(slider.value);
      value.textContent = speedFactor.toFixed(1);
    });

    row.appendChild(label);
    row.appendChild(slider);
    row.appendChild(value);
    controls.appendChild(row);
    

    sprites.forEach(randomizeSprite);
    loop();
  </script>
</body>
</html>
