<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koid im Knack</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="screen"></canvas>
  <script>
    const canvas = document.getElementById('screen');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    const imageFiles = [
      'face.png',
      'face2.png',
      'face3.png',
      'face4.png'
    ];

    const images = imageFiles.map((fileName) => {
      const img = new Image();
      img.src = `images/${fileName}`;
      return img;
    });

    const sprites = imageFiles.map((_, index) => ({
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      width: 80,
      height: 80,
      imageIndex: index,
    }));

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randomizeSprite(sprite) {
      sprite.x = randomBetween(0, canvas.width - sprite.width);
      sprite.y = randomBetween(0, canvas.height - sprite.height);
      const speed = randomBetween(2.5, 10);
      const angle = randomBetween(0, Math.PI * 2);
      sprite.vx = Math.cos(angle) * speed;
      sprite.vy = Math.sin(angle) * speed;
      if (Math.abs(sprite.vx) < 1) sprite.vx = Math.sign(sprite.vx || 1) * 1.5;
      if (Math.abs(sprite.vy) < 1) sprite.vy = Math.sign(sprite.vy || 1) * 1.5;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      sprites.forEach((sprite) => {
        const image = images[sprite.imageIndex];
        if (image.complete && image.naturalWidth > 0) {
          ctx.drawImage(image, sprite.x, sprite.y, sprite.width, sprite.height);
        } else {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(sprite.x, sprite.y, sprite.width, sprite.height);
        }
      });
    }

    function collides(a, b) {
      return a.x < b.x + b.width && a.x + a.width > b.x &&
             a.y < b.y + b.height && a.y + a.height > b.y;
    }

    function resolveCollision(a, b) {
      const overlapX = Math.min(a.x + a.width - b.x, b.x + b.width - a.x);
      const overlapY = Math.min(a.y + a.height - b.y, b.y + b.height - a.y);
      if (overlapX < overlapY) {
        const direction = a.x < b.x ? -1 : 1;
        a.x += direction * overlapX / 2;
        b.x -= direction * overlapX / 2;
        const vx = a.vx;
        a.vx = b.vx;
        b.vx = vx;
      } else {
        const direction = a.y < b.y ? -1 : 1;
        a.y += direction * overlapY / 2;
        b.y -= direction * overlapY / 2;
        const vy = a.vy;
        a.vy = b.vy;
        b.vy = vy;
      }
    }

    function update() {
      sprites.forEach((sprite) => {
        sprite.x += sprite.vx;
        sprite.y += sprite.vy;

        if (sprite.x + sprite.width > canvas.width) {
          sprite.x = canvas.width - sprite.width;
          sprite.vx *= -1;
        } else if (sprite.x < 0) {
          sprite.x = 0;
          sprite.vx *= -1;
        }
        if (sprite.y + sprite.height > canvas.height) {
          sprite.y = canvas.height - sprite.height;
          sprite.vy *= -1;
        } else if (sprite.y < 0) {
          sprite.y = 0;
          sprite.vy *= -1;
        }
      });

      for (let i = 0; i < sprites.length; i += 1) {
        for (let j = i + 1; j < sprites.length; j += 1) {
          const a = sprites[i];
          const b = sprites[j];
          if (collides(a, b)) {
            resolveCollision(a, b);
          }
        }
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    sprites.forEach(randomizeSprite);
    loop();
  </script>
</body>
</html>
